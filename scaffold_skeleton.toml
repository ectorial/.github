Component registry used by `wsr` to resolve `uses:` references to signed
Wasm components.

## Milestones

- **v0.1** — internal, read-only; hosts the first-party catalog.
- **v0.2** — public read; `wsr publish` for community authors.
- **v0.4** — signature verification at resolution time; `wsr login`.

