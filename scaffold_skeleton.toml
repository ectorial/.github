# scaffold_skeleton.toml
#
# Ectorial org scaffolding plan for v0.1 (Execution Core).
#
# Driven by scripts/scaffold_skeleton.py. Run with:
#
#     uv run scripts/scaffold_skeleton.py --dry-run
#     uv run scripts/scaffold_skeleton.py
#
# Each [[commands]] entry is one logical unit of work (usually: "bring one
# repo up to its v0.1 baseline"). Each [[commands.steps]] is a single
# idempotent operation. Re-running is safe — existing repos and files are
# skipped unless overwrite=true is set.
#
# See ROADMAP.md § v0.1 and ARCHITECTURE.md for why each repo exists.

[defaults]
owner = "ectorial"
default_branch = "main"

# ===========================================================================
# ectorial/wsr — the core execution engine
# ===========================================================================

[[commands]]
name = "wsr"
summary = "Bootstrap ectorial/wsr — the Wasm CI runtime (v0.1 core)"

[[commands.steps]]
op = "ensure_repo"
repo = "wsr"
description = "WSR — the Wasm component CI runtime. Ship less Docker with every release."
private = false
topics = ["wasm", "ci", "cd", "wasi", "component-model", "wasmtime", "rust"]

[[commands.steps]]
op = "ensure_file"
repo = "wsr"
path = "README.md"
content = """
# wsr

**WSR** is the Wasm component CI runtime — the core engine of the
[ectorial](https://github.com/ectorial) ecosystem.

> Docker virtualizes the computer. WSR virtualizes the task.

Status: **v0.1 — Public Alpha** (see [ROADMAP](https://github.com/ectorial/.github/blob/main/ROADMAP.md)).

## What it does

- Parses `wsr.toml` and `.github/workflows/*.yml` workflow definitions.
- Resolves action references to signed Wasm components (Tier 1).
- Runs jobs through Wasmtime (WASI Preview 2/3 components) — no Docker.
- Manages WASI capability grants (filesystem, env, secrets).

## Quick start

```sh
wsr run wsr.toml
```

See `ARCHITECTURE.md` for internal design.
"""

[[commands.steps]]
op = "ensure_file"
repo = "wsr"
path = "ARCHITECTURE.md"
content = """
# wsr — Internal Architecture

This document covers the **internal** architecture of `wsr`. For the
ecosystem-level view, see
[ectorial/.github/ARCHITECTURE.md](https://github.com/ectorial/.github/blob/main/ARCHITECTURE.md).

## Subsystems

- **Workflow Parser** — `wsr.toml` and `.github/workflows/*.yml` ingest.
- **Component Resolver** — `uses:` → Wasm component digest.
- **Tier Selector** — Tier 1 (Wasmtime) vs Tier 2 (Wasmer + WASIX).
- **Capability Broker** — WASI capability grants per job.
- **Job Graph Orchestrator** — sequential today; parallel in v0.1's last
  milestone; distributed in v1.0.

TODO: flesh out each subsection as v0.1 lands.
"""

[[commands.steps]]
op = "ensure_file"
repo = "wsr"
path = ".gitignore"
content = """
/target
**/*.rs.bk
*.wasm
*.wat
.env
.DS_Store
"""

# ===========================================================================
# ectorial/wit — shared ABI contract
# ===========================================================================

[[commands]]
name = "wit"
summary = "Bootstrap ectorial/wit — shared WIT interface definitions"

[[commands.steps]]
op = "ensure_repo"
repo = "wit"
description = "Shared WIT interfaces. The ABI contract between wsr and every ectorial action."
private = false
topics = ["wit", "wasi", "component-model", "abi"]

[[commands.steps]]
op = "ensure_file"
repo = "wit"
path = "README.md"
content = """
# wit

**Single source of truth** for the WIT interfaces used across the ectorial
ecosystem.

Every `ectorial/actions/*` component is typed against an interface defined
in this repo. `wsr` provides host implementations for each interface.

## v0.1 scope

- `checkout` input/output interface
- `setup-*` pattern interface
- filesystem + environment host interfaces (provided by `wsr`)

## Stability

> Changing a WIT interface is a breaking change. Follow semver; add
> deprecation cycles before removal.

See `ARCHITECTURE.md` in this repo and
[ectorial/.github/ARCHITECTURE.md](https://github.com/ectorial/.github/blob/main/ARCHITECTURE.md)
for the ecosystem map.
"""

[[commands.steps]]
op = "ensure_file"
repo = "wit"
path = "wit/.gitkeep"
content = ""

# ===========================================================================
# ectorial/actions — actions catalog umbrella
# ===========================================================================

[[commands]]
name = "actions"
summary = "Bootstrap ectorial/actions — catalog umbrella / registry of first-party actions"

[[commands.steps]]
op = "ensure_repo"
repo = "actions"
description = "Index of first-party ectorial/* Wasm component actions. Tier 1 catalog."
private = false
topics = ["ectorial", "actions", "wasm", "catalog"]

[[commands.steps]]
op = "ensure_file"
repo = "actions"
path = "README.md"
content = """
# ectorial/actions

Catalog of first-party Wasm component actions shipped by ectorial.

Each action lives in its own repository (`ectorial/checkout`,
`ectorial/setup-node`, …) and is published as a signed Wasm Component
targeting **Tier 1** (Wasmtime + WASI Preview 3).

## v0.1 catalog

| Action | Repo | Tier | Status |
| --- | --- | --- | --- |
| `checkout` | [ectorial/checkout](https://github.com/ectorial/checkout) | 1 | scaffold |
| `setup-node` | [ectorial/setup-node](https://github.com/ectorial/setup-node) | 1 | scaffold |

See the org [ROADMAP](https://github.com/ectorial/.github/blob/main/ROADMAP.md)
for the v0.2+ roadmap (setup-python, cache, artifacts, …).
"""

